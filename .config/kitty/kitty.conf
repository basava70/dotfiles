# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Tokyo Night Moon
include tokyonight-night.conf
# END_KITTY_THEME
# BEGIN_KITTY_FONTS
font_family      MonoLisa
bold_font        auto
italic_font      auto
bold_italic_font auto
font_features MonoLisa +liga +ss02 +ss03 +ss05 +ss06 +ss07 +ss08 +ss10 +ss11 +ss12 +ss13 +ss14 +ss15 +ss01 +zero +ss16
#END_KITTY_FONTS
# font_family Liga SFMono Nerd Font
# font_family FiraCode Nerd Font
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
# END_KITTY_FONTS

font_size 13

window_decorations full

background_opacity 1

allow_remote_control yes
forward_stdio yes
